# ─────────────────────────────────────────────────────────────────────────────
# Sim2Real 单机本机演示 · 一体化编排（两个后端 + PostgreSQL + sim 前端）
#
# 用途：在【一台机器】上用 Docker 起全部 *后端*，并用已 seed 的 P9 工厂跑通 3D 串流。
#       Kit（Omniverse，需 RTX GPU）独立运行：Linux 容器加入本 Compose 网络，Windows 可用宿主原生 Kit。
#
# 与同目录另两个 compose 的区别：
#   - docker-compose.yml      ：旧·开发模式，仅 sim 三件套，build context 写成 ./codes/（本仓库没有该目录，会构建失败）
#   - docker-compose.prod.yml ：旧·离线交付，仅 sim 三件套，依赖缺失的 package-offline.ps1
#   - 本文件                  ：修正 build context 为 ../源码/，并补齐 aifactory_backend，端口/依赖/串流一次配好
#
# 起停：
#   docker compose -f docker/docker-compose.demo.yml build          # 构建镜像（首次较慢：国内源装依赖 + npm ci）
#   docker compose -f docker/docker-compose.demo.yml up -d          # 起全部
#   docker compose -f docker/docker-compose.demo.yml logs -f sim-backend   # 看迁移/灌种子/uvicorn 日志
#   docker compose -f docker/docker-compose.demo.yml down           # 停（保留 DB 卷）
#   docker compose -f docker/docker-compose.demo.yml down -v        # 停并清空 DB 卷（下次重新迁移+灌种子）
#
# 访问：sim 前端 http://localhost:8080 ｜ sim 后端 http://localhost:8000/docs ｜
#       aifactory 后端仅本机调试 http://127.0.0.1:8129/docs（远程浏览器统一走 Creator :8081 的 /api）
#
# ⚠️ 可被 docker/.env（见 .env.demo.example）覆盖的变量：POSTGRES_PASSWORD / AIFACTORY_STORAGE_HOST /
#    AIFACTORY_CORS_ORIGINS / KIT_API_UPSTREAM / SIM2REAL_DOCKER_NETWORK /
#    VITE_KIT_API_URL / VITE_KIT_STREAM_URL / VITE_BACKEND_DIRECT_URL
# ─────────────────────────────────────────────────────────────────────────────

name: sim2real-demo

services:
  # ── PostgreSQL（sim 与 aifactory 共用同一库 aifactory_simulation）────────────
  sim-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: aifactory_simulation
    command: ["postgres", "-c", "jit=off"]   # 大批量事件 COPY 写入防段错误（见后端 Dockerfile 注释）
    ports:
      # 只绑定 loopback：保留宿主原生 Kit/psql 兼容性，不向局域网暴露数据库。
      # Linux Kit 容器仍应通过 Docker 内网的 sim-postgres:5432 访问。
      - "127.0.0.1:5432:5432"
    volumes:
      - sim_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aifactory_simulation"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # ── sim_backend（仿真引擎 + 数据库 schema 拥有者）─────────────────────────────
  # entrypoint 顺序：等 PG → alembic upgrade head → 若 md_factory 为空则 load_seed.py
  #   （建 md_*/sim_*/res_* + 执行 creator_tables.sql 建 aifactory 专有表 + 灌资产库 + 灌 P9 主数据）
  #   → exec 下面的 command 起 uvicorn。故它 healthy 时，全部表 + 种子都已就绪。
  sim-backend:
    image: sim2real/sim-backend:demo
    build:
      context: ../src/sim_backend       # ← 关键修正：实际源码在 源码/ 下，不是 ./codes/
      dockerfile: Dockerfile
    depends_on:
      sim-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@sim-postgres:5432/aifactory_simulation
      PYTHONUNBUFFERED: "1"
    # 覆盖镜像里的开发 CMD：去掉 --reload；单 worker（DES 引擎的 COPY+索引重建假设单写者，演示足够）
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"          # ★ 必须发布：宿主上的 Kit 通过 http://localhost:8000 拉事件（playback load-from-backend）
    restart: unless-stopped

  # ── aifactory_backend（3D 资产/工厂实例管理 · 纯消费 sim 建好的表）──────────────
  aifactory-backend:
    image: sim2real/aifactory-backend:demo
    build:
      context: ../src/aifactory_backend  # ← 同样修正路径
      dockerfile: Dockerfile
    depends_on:
      sim-backend:
        condition: service_healthy        # 等 sim-backend 把表建好+种子灌完（schema 由它拥有）
    environment:
      ENVIRONMENT: production
      # 连同一个 PG（用 compose 服务名 sim-postgres，不是 localhost）
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_HOST: sim-postgres
      DB_PORT: "5432"
      DB_NAME: aifactory_simulation
      AIFACTORY_CREATE_ALL: "false"        # 不自己建表，依赖 sim_backend 的 creator_tables.sql
      AIFACTORY_STORAGE_ROOT: /data/storage
      # 仅用于确有跨域直连 8129 的开发工具；Creator 生产流量走 :8081/nginx 同源代理。
      # 禁止 "*"；多个 origin 用英文逗号分隔。
      AIFACTORY_CORS_ORIGINS: ${AIFACTORY_CORS_ORIGINS:-http://localhost:8081,http://127.0.0.1:8081}
      # nginx 以该服务端密钥认证所有 Creator 写请求；production 缺失时后端拒绝启动。
      CREATOR_API_KEY: ${CREATOR_API_KEY:?set CREATOR_API_KEY in docker/.env (openssl rand -hex 32)}
      # ZIP 上传安全阈值。必须在 Compose 中显式转发；docker/.env 只负责插值，不会自动注入容器。
      AIFACTORY_ZIP_MAX_ENTRIES: "${AIFACTORY_ZIP_MAX_ENTRIES:-10000}"
      AIFACTORY_ZIP_MAX_SINGLE_FILE_BYTES: "${AIFACTORY_ZIP_MAX_SINGLE_FILE_BYTES:-536870912}"
      AIFACTORY_ZIP_MAX_TOTAL_UNCOMPRESSED_BYTES: "${AIFACTORY_ZIP_MAX_TOTAL_UNCOMPRESSED_BYTES:-2147483648}"
      AIFACTORY_ZIP_MAX_COMPRESSION_RATIO: "${AIFACTORY_ZIP_MAX_COMPRESSION_RATIO:-200}"
      AIFACTORY_ZIP_MAX_ARCHIVE_BYTES: "${AIFACTORY_ZIP_MAX_ARCHIVE_BYTES:-536870912}"
      # DB root_usd_path 前缀（Kit 视角形式，与下方挂载源解耦，一般不用改）
      AIFACTORY_USD_HOST_ROOT: ${AIFACTORY_USD_DB_PREFIX:-../storage}
    # 不覆盖 command：用镜像内置 CMD（uvicorn main:app --port 8128 --workers 2）。
    # 健康检查包含数据库 SELECT 1，避免进程存活但数据库不可用时误报 healthy。
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8128/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    ports:
      # 只绑定 loopback，避免未鉴权的 Creator 写接口直接暴露到局域网。
      # 远程浏览器仍通过 http://<SERVER>:8081/api/* 正常访问。
      - "127.0.0.1:8129:8128"
    volumes:
      # 资产/缩略图/USD 库根目录（仅管【挂载源】，DB 路径前缀见上方 AIFACTORY_USD_DB_PREFIX）。
      # 默认指向 docker/storage-data（空目录也能启动，main.py 会 makedirs）。
      # 有真实 31GB 资产库时：在 docker/.env 把 AIFACTORY_STORAGE_HOST 指到宿主实际目录
      # （必须 = Kit 读取的同一目录，如 /data/kitapp/storage）。
      # ⚠️ 目录属主需为 UID 1000（容器内 appuser），否则写文件报 Permission denied：
      #    sudo chown -R 1000:1000 <该目录>
      - ${AIFACTORY_STORAGE_HOST:-./storage-data}:/data/storage
    restart: unless-stopped

  # ── sim_frontend（用于在本机验证串流；非“后端”，但跑通 3D 必需，故一并起）──────────
  # nginx 托管 dist + 同源反代 /api → sim-backend:8000。
  # 浏览器端的 3 个 Kit/直连 URL 在【构建期】烤入静态产物，故改了要 rebuild（见下方 args）。
  sim-frontend:
    image: sim2real/sim-frontend:demo
    build:
      context: ../src/sim_frontend
      dockerfile: Dockerfile.prod
      args:
        # 本机演示：浏览器、Kit、后端都在同一台机器，localhost 即可。
        # VITE_KIT_API_URL：sim 前端直连 Kit 的 /ov + /kit/playback 控制端点。
        #   ★ sim 的 Kit 在 :8233 —— 与 aifactory 前端用的 Kit :8011 是【分开的两个端口/服务】，勿混用。
        #   这里仅作构建期回退；运行期以下面的 KIT_API_PORT 注入为准（runtime-config.js）。
        VITE_KIT_API_URL: ${VITE_KIT_API_URL:-http://localhost:8233}
        # VITE_KIT_STREAM_URL：现在只作【3D 视口开关】——非空=启用「直连 WebRTC」（前端自己连 Kit 的
        # media:12333/signal:12334，**不再需要单独起 5183 串流页**）；留空=降级 2D mock。
        # 实际连接目标(Kit 主机/端口)在 源码/sim_frontend/stream.config.json（默认 127.0.0.1:12333/12334）。
        VITE_KIT_STREAM_URL: ${VITE_KIT_STREAM_URL:-enabled}
        # 串流方式：direct=直连 WebRTC（默认）；iframe=回退到 5183 串流页（逃生门，需把上面 VITE_KIT_STREAM_URL 设成真实 5183 地址）。
        VITE_KIT_STREAM_MODE: ${VITE_KIT_STREAM_MODE:-direct}
        # VITE_BACKEND_DIRECT_URL：Kit 服务端回拉事件用，必须是宿主可达的后端地址（即上面发布的 :8000）。
        VITE_BACKEND_DIRECT_URL: ${VITE_BACKEND_DIRECT_URL:-http://localhost:8000}
    # ★ 运行期 Kit 主机注入：换机/换 IP 只需改 docker/.env 的 KIT_HOST_IP 后 `up -d`，
    #   容器启动脚本(docker-runtime-config.sh)会按它重写 runtime-config.js，【无需 rebuild】。
    #   这些 runtime env 覆盖上面构建期烤进的 VITE_* 默认值（浏览器优先读 window.__RUNTIME_CONFIG__）。
    environment:
      KIT_HOST_IP: ${KIT_HOST_IP:-127.0.0.1}    # Kit 宿主可达 IP（远程访问填局域网 IP，本机演示留 127.0.0.1）
      KIT_API_PORT: ${KIT_API_PORT:-8233}        # ★ sim 前端的 Kit /ov 控制端口 = 8233（独立于 aifactory 的 8011）
      BACKEND_PORT: ${BACKEND_PORT:-8000}        # sim 后端发布端口（Kit 回拉事件用）
    depends_on:
      - sim-backend
    # 覆盖健康检查：镜像默认 wget http://localhost/ 会解析到 IPv6 ::1（nginx 只听 IPv4）→ 误报 unhealthy；改用 127.0.0.1。
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "8080:80"            # 宿主 8080 → 容器 nginx 80
    restart: unless-stopped

  # ── aifactory_frontend（Creator UI · 资产库 + 工厂实例编排 + 3D 视口）─────────────
  # nginx 托管 dist + 反代 /api,/static → aifactory-backend，/ov → 宿主 Kit。
  aifactory-frontend:
    image: sim2real/aifactory-frontend:demo
    build:
      context: ../src/aifactory_frontend
      dockerfile: Dockerfile.prod
    # ★ 运行期 Kit 主机注入：aifactory 前端的 /api、/ov 走 nginx 同源反代，唯独 WebRTC（浏览器直连
    #   Kit 的 12333/12334）需要 Kit IP。换 IP 改 docker/.env 的 KIT_HOST_IP 后 `up -d` 即可，无需 rebuild。
    environment:
      KIT_HOST_IP: ${KIT_HOST_IP:-127.0.0.1}
      CREATOR_AUTH_USERNAME: ${CREATOR_AUTH_USERNAME:-creator}
      CREATOR_API_KEY: ${CREATOR_API_KEY:?set CREATOR_API_KEY in docker/.env (openssl rand -hex 32)}
      # Linux/Kit 容器安全拓扑：Kit 加入本 compose 网络，8011 不发布到宿主，由 nginx 走容器 DNS。
      # Windows/宿主原生 Kit：在 docker/.env 覆盖为 host.docker.internal:8011。
      KIT_API_UPSTREAM: ${KIT_API_UPSTREAM:-sim2real:8011}
    depends_on:
      - aifactory-backend
    extra_hosts:
      # 仅供 KIT_API_UPSTREAM=host.docker.internal:8011 的宿主原生 Kit 兼容模式使用。
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "8081:80"            # 宿主 8081 → 容器 nginx 80
    restart: unless-stopped

volumes:
  sim_pgdata:

# 固定网络名，供独立 `docker run` 的 Kit 可靠加入并通过 sim-postgres:5432 访问数据库。
# 若覆盖名称，docker/run-kit-linux.sh 会从同一 docker/.env 读取。
networks:
  default:
    name: ${SIM2REAL_DOCKER_NETWORK:-sim2real-demo_default}
