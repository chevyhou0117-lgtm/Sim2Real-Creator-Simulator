# aifactory_frontend 生产 nginx：托管 SPA + 反代后端/Kit
#   /api  /static → aifactory_backend（compose 服务名 aifactory-backend，容器内端口 8128）
#   /ov            → 宿主机原生 Kit（:8011），host.docker.internal 由 compose extra_hosts 注入
#   WebRTC 12333/12334 不在这里——浏览器按 stream.config.json 直连宿主 Kit
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;
    gzip_min_length 1024;

    # 业务接口 → aifactory_backend
    location /api/ {
        proxy_pass http://aifactory-backend:8128;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 资产 ZIP 上传/下载可能很大且慢
        client_max_body_size 0;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # 静态资源（缩略图 / USD，由后端 /static 挂载提供）
    location /static/ {
        proxy_pass http://aifactory-backend:8128;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }

    # Omniverse 控制端点 → 宿主机 Kit（不在容器内）
    location /ov/ {
        proxy_pass http://host.docker.internal:8011;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header Connection '';     # /ov/*_stream 若走 SSE：关 buffer、长超时
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
