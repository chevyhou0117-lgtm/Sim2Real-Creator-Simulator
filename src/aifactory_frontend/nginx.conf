# aifactory_frontend 生产 nginx：托管 SPA + 反代后端/Kit
#   /api  /static → aifactory_backend（compose 服务名 aifactory-backend，容器内端口 8128）
#   /ov            → Kit（默认同 Docker 网络的 sim2real:8011；可由 KIT_API_UPSTREAM 覆盖）
#   WebRTC 12333/12334 不在这里——浏览器按 stream.config.json 直连宿主 Kit
server {
    listen 80;
    server_name _;

    # 由 40-runtime-config.sh 在 nginx 启动前生成。保护 UI、/api 与 /ov，避免任何
    # 局域网客户端借公开 nginx 绕过后端密钥。/healthz 单独免认证供容器健康检查。
    include /etc/nginx/creator-auth.inc;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;
    gzip_min_length 1024;

    # Docker 内置 DNS；配合变量形式 proxy_pass 延迟解析。
    # 这样前端可先于 Kit 启动，Kit 暂时不可用时仅 /ov 返回 502，不会让 nginx 启动失败。
    resolver 127.0.0.11 valid=10s ipv6=off;

    location = /healthz {
        auth_basic off;
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # 运行期配置和 SPA 入口不得协商 304，确保换 KIT_HOST_IP 后浏览器立即拿到新值。
    location = /runtime-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires -1;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires -1;
        try_files $uri =404;
    }

    # 业务接口 → aifactory_backend
    location /api/ {
        proxy_pass http://aifactory-backend:8128;
        # 由启动脚本生成：清除浏览器 Basic 凭据，并以服务端密钥认证后端写请求。
        include /etc/nginx/creator-upstream-auth.inc;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 资产 ZIP 上传/下载可能很大且慢
        client_max_body_size 0;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # 静态资源（缩略图 / USD，由后端 /static 挂载提供）
    location /static/ {
        proxy_pass http://aifactory-backend:8128;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization "";
        proxy_read_timeout 600s;
    }

    # Omniverse 控制端点 → Kit。
    # KIT_API_UPSTREAM 由 nginx 官方镜像在启动时从本模板展开：
    #   Linux 容器 Kit：sim2real:8011（8011 无需发布到宿主）
    #   Windows/宿主 Kit：host.docker.internal:8011
    location /ov/ {
        set $kit_api_upstream "${KIT_API_UPSTREAM}";
        proxy_pass http://$kit_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header Authorization "";
        proxy_set_header Connection '';     # /ov/*_stream 若走 SSE：关 buffer、长超时
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
