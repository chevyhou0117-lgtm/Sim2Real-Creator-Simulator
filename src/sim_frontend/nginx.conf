# sim_frontend 生产 nginx 配置：托管 SPA 静态资源 + 反代 /api 到后端
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 静态资源开 gzip（图表/JS bundle 较大）
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;
    gzip_min_length 1024;

    # /api 反代到后端服务（容器网络内用 compose 服务名 sim-backend）
    # 浏览器始终只访问前端同源 /api，无需知道后端地址，规避跨域。
    location /api/ {
        proxy_pass http://sim-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 事件流/大结果可能较慢，放宽超时
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # 模拟结果端点支持 gzip，关闭 nginx 二次缓冲避免延迟
        proxy_buffering off;
    }

    # SPA 前端路由：所有非静态、非 /api 的路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
